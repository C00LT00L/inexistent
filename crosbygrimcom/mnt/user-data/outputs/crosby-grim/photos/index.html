<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photos &mdash; Crosby Grim</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <style>
    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,10,10,0.96);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      border: 1px solid var(--border-light);
    }
    #lightbox-close {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      cursor: pointer;
      transition: color var(--transition);
      background: none;
      border: none;
      text-transform: uppercase;
    }
    #lightbox-close:hover { color: var(--bright); }
  </style>
</head>
<body>

  <header>
    <div class="nav-inner">
      <a href="../index.html" class="nav-logo">Crosby<span>&nbsp;Grim</span></a>
      <nav>
        <ul>
          <li><a href="../index.html">Home</a></li>
          <li><a href="../projects/index.html">Projects</a></li>
          <li><a href="index.html" class="active">Photos</a></li>
          <li><a href="../about/index.html">About</a></li>
        </ul>
      </nav>
    </div>
    <div class="metal-rule"></div>
  </header>

  <main>
    <div class="page">

      <div class="page-title-block fade-up fade-up-1">
        <h1><strong>Photos</strong></h1>
        <p>Personal photography. Click any image to view it full size.</p>
      </div>

      <!-- MASONRY PHOTO GRID -->
      <!-- 
        TO ADD YOUR OWN IMAGES:
        Replace each .photo-placeholder div with a real <img> tag, like this:
        <div class="photo-item" data-src="path/to/full-image.jpg">
          <img src="path/to/thumbnail.jpg" alt="Description of photo" />
        </div>
        The data-src attribute is used by the lightbox to open the full-size version.
        If thumbnail and full size are the same file, use the same path for both.
      -->
      <div class="photo-grid fade-up fade-up-2">

        <div class="photo-item" data-src="">
          <div class="photo-placeholder" style="--ratio:4/3;">No image yet</div>
        </div>
        <div class="photo-item" data-src="">
          <div class="photo-placeholder" style="--ratio:3/4;">No image yet</div>
        </div>
        <div class="photo-item" data-src="">
          <div class="photo-placeholder" style="--ratio:1/1;">No image yet</div>
        </div>
        <div class="photo-item" data-src="">
          <div class="photo-placeholder" style="--ratio:16/9;">No image yet</div>
        </div>
        <div class="photo-item" data-src="">
          <div class="photo-placeholder" style="--ratio:4/5;">No image yet</div>
        </div>
        <div class="photo-item" data-src="">
          <div class="photo-placeholder" style="--ratio:3/2;">No image yet</div>
        </div>
        <div class="photo-item" data-src="">
          <div class="photo-placeholder" style="--ratio:2/3;">No image yet</div>
        </div>
        <div class="photo-item" data-src="">
          <div class="photo-placeholder" style="--ratio:4/3;">No image yet</div>
        </div>
        <div class="photo-item" data-src="">
          <div class="photo-placeholder" style="--ratio:1/1;">No image yet</div>
        </div>

      </div>

    </div>
  </main>

  <!-- LIGHTBOX -->
  <div id="lightbox">
    <button id="lightbox-close">Close &times;</button>
    <img id="lightbox-img" src="" alt="" />
  </div>

  <footer>
    <div class="footer-inner">
      <span class="footer-name">Crosby Grim</span>
      <span class="footer-copy">&copy; <script>document.write(new Date().getFullYear())</script> &mdash; All rights reserved</span>
    </div>
  </footer>

  <script src="../assets/js/nav.js"></script>
  <script>
    // Lightbox
    const lightbox   = document.getElementById('lightbox');
    const lbImg      = document.getElementById('lightbox-img');
    const lbClose    = document.getElementById('lightbox-close');

    document.querySelectorAll('.photo-item').forEach(item => {
      item.addEventListener('click', () => {
        const src = item.dataset.src;
        const img = item.querySelector('img');
        if (!src && !img) return; // placeholder, no action
        lbImg.src = src || (img ? img.src : '');
        lbImg.alt = img ? img.alt : '';
        lightbox.classList.add('open');
        document.body.style.overflow = 'hidden';
      });
    });

    function closeLightbox() {
      lightbox.classList.remove('open');
      lbImg.src = '';
      document.body.style.overflow = '';
    }

    lbClose.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', e => {
      if (e.target === lightbox) closeLightbox();
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeLightbox();
    });
  </script>
</body>
</html>
